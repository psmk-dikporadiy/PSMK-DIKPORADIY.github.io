<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Berita PSMK Dikpora DIY</title>
    
    <!-- Font Fjalla One untuk Teks Animasi -->
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&display=swap" rel="stylesheet">
    
    <!-- FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- Definisi Properti CSS --- */
        @property --s-anim {
            syntax: "<percentage>";
            inherits: false;
            initial-value: 0%;
        }
        @property --sm {
            syntax: "<percentage>";
            inherits: false;
            initial-value: 0%;
        }
        @property --x {
            syntax: "<percentage>";
            inherits: false;
            initial-value: -180%;
        }
        @property --x2 {
            syntax: "<percentage>";
            inherits: false;
            initial-value: 0%;
        }
        @property --sc {
            syntax: "<numbers>";
            inherits: false;
            initial-value: 1;
        }
        @property --ry {
            syntax: "<degrees>";
            inherits: false;
            initial-value: -33deg;
        }
        @property --ry2 {
            syntax: "<angle>";
            inherits: false;
            initial-value: 0deg;
        }

        /* --- Reset Dasar --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* --- Gaya Bodi --- */
        html,
        body {
            width: 100%;
            min-height: 100vh; 
            background: #000; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start; 
            padding: 20px; 
            color: #fff; 
            font-family: "Fjalla One", sans-serif; 
            line-height: 1.5;
        }

        /* --- Gaya Galeri Gambar --- */
        .gallery-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-top: 50px; 
            font-family: sans-serif; 
        }

        .gallery {
            --s-bevel: 50px; 
            
            display: flex;
            gap: 10px;
            margin: 10px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
        }

        .gallery > img {
            flex: 1;
            min-width: 0;
            height: 300px;
            object-fit: cover;
            border-start-start-radius: var(--s-bevel) 100%;
            border-end-end-radius: var(--s-bevel) 100%;
            margin-inline-end: calc(-1 * var(--s-bevel));
            corner-shape: bevel;
            cursor: pointer;
            transition: .3s linear;
        }

        .gallery > img:hover {
            flex: 1.6;
        }

        .gallery > img:is(:first-child, :hover),
        .gallery > img:hover + * {
            border-start-start-radius: 0 100%;
        }

        .gallery > img:is(:last-child, :hover),
        .gallery > img:has(+ :hover) {
            border-end-end-radius: 0 100%;
            margin-inline-end: 0;
        }

        @supports not (corner-shape: bevel) {
            .gallery > img {
                border-radius: 0 !important;
                margin: 0 !important;
            }
        }

        /* --- Gaya Animasi Teks --- */
        .scene,
        .scene2 {
            position: relative;
            color: #fff;
            font-size: clamp(1.2rem, 4vw, 3rem); 
            transform-style: preserve-3d;
            perspective: 1000px;
            margin-bottom: 20px; 
        }

        .scene2 {
            position: absolute; 
        }

        .scene {
            width: fit-content;
        }

        .scene span {
            display: block;
        }

        .move-number {
            position: absolute;
            right: 0;
            transform-style: preserve-3d;
            perspective: 1000px;
            transform: translateX(var(--x));
            animation: move 10s linear infinite; 
            will-change: transform;
        }

        .move-letter {
            position: absolute;
            left: var(--x2);
            right: 0;
            opacity: 0;
            transform: rotate(var(--ry2));
            animation: moveletter 10s ease-in-out infinite; 
            display: inline-block;
            width: fit-content;
        }

        .last-item {
            transform: scale(1, var(--sc)) rotateY(var(--ry)) translateZ(-3px);
            color: red;
            transition: transform 0.3s linear;
        }

        .number-container {
            mask: linear-gradient(
                to right,
                transparent 0%,
                black 0%,
                black var(--s-anim),
                transparent var(--s-anim)
            );
            transform: translateZ(2px);
            animation: move2 10s ease-in-out infinite; 
        }

        .msn-container {
            mask: linear-gradient(
                to right,
                transparent 0%,
                black 0%,
                black var(--sm),
                transparent var(--sm)
            );
            animation: msn-container 10s ease-in-out infinite;
        }

        .mask-number {
            display: flex;
            white-space: pre; 
        }

        .mask-number span {
            color: red;
        }

        /* --- Keyframes Animasi --- */
        @keyframes move {
            0% { --x: -180%; --sc: 1; --ry: -33deg; opacity: 0; }
            1% { --x: -180%; --sc: 1; --ry: -33deg; opacity: 1; }
            9% { --sc: 2; --x: 94%; --ry: -33deg; }
            20% { --sc: 1; --ry: 0deg; --x: 94%; }
            27% { --sc: 2; --ry: -33deg; --x: 94%; }
            36% { --x: -180%; --sc: 1; --ry: -33deg; opacity: 1; }
            38%, 100% { --x: -180%; --sc: 1; --ry: -33deg; opacity: 0; }
        }

        @keyframes move2 {
            0% { --s-anim: 0%; }
            10%, 27% { --s-anim: 100%; }
            36%, 100% { --s-anim: 0%; }
        }

        @keyframes moveletter {
            0%, 39% { opacity: 0; --x2: 0%; --ry2: 0deg; }
            40% { opacity: 1; --x2: 0%; --ry2: 0deg; }
            49%, 70% { --x2: 93%; --ry2: 720deg; opacity: 1; }
            79% { --x2: 0%; --ry2: 0deg; opacity: 1; }
            80%, 100% { opacity: 0; --x2: 0%; --ry2: 0deg; }
        }

        @keyframes msn-container {
            0%, 40% { filter: blur(30px) contrast(10); --sm: 0%; }
            50%, 70% { filter: blur(0px) contrast(10); --sm: 100%; }
            80%, 100% { filter: blur(30px) contrast(10); --sm: 0%; }
        }
    </style>
</head>
<body>

<!-- --- Bagian Animasi Intro --- -->
<div class="intro-section" style="position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px;">

    </div>
    <div class="scene2">

        </div>
        <div class="msn-container">
            <span class="mask-number">Disdikpora <span>DIY</span></span>
        </div>
    </div>
</div>
