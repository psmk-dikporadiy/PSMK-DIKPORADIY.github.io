<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Berita PSMK Dikpora DIY</title>
    
    <!-- Font Inter untuk Tampilan Modern -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #1e3a8a; /* Biru Gelap DIY */
            --secondary: #3b82f6; /* Biru Terang */
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* --- HEADER --- */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #2563eb 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.15);
        }

        .header h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #bfdbfe;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        /* --- KONTEN UTAMA (BERITA) --- */
        .container {
            max-width: 1200px;
            margin: -30px auto 40px;
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 40px 0 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        .section-header h3 {
            font-size: 1.4rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- GRID BERITA --- */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* --- KARTU BERITA --- */
        .news-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid #f1f5f9;
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .news-image {
            width: 100%;
            height: 200px;
            background-color: #e2e8f0;
            object-fit: cover;
        }

        .news-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .news-date {
            font-size: 0.85rem;
            color: var(--secondary);
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .news-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .news-excerpt {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .read-more {
            margin-top: auto;
            display: inline-block;
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }

        .read-more:hover {
            color: var(--secondary);
            text-decoration: underline;
        }

        /* --- FOOTER --- */
        .footer {
            text-align: center;
            padding: 30px 20px;
            background-color: white;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid #e2e8f0;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2rem; }
            .news-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="header">
        <h2>Daerah Istimewa Yogyakarta</h2>
        <h1>Portal Informasi PSMK</h1>
        <p>Kumpulan berita terkini, agenda, dan informasi seputar Sekolah Menengah Kejuruan di lingkungan Dinas Dikpora DIY.</p>
    </header>

    <div class="container">
        <div class="section-header">
            <h3><i class="fa-regular fa-newspaper"></i> Berita & Informasi Terkini</h3>
        </div>

        <!-- Wadah ini akan diisi secara otomatis oleh JavaScript -->
        <div class="news-grid" id="news-container">
            <!-- Berita dirender di sini -->
        </div>
    </div>

    <footer class="footer">
        &copy; 2026 Bidang PSMK - Dinas Pendidikan, Pemuda, dan Olahraga Daerah Istimewa Yogyakarta
    </footer>

    <!-- SCRIPT UNTUK MENYUSUN BERITA SECARA OTOMATIS -->
    <script>
        // Simulasi Data Berita (Di Apps Script, data ini bisa ditarik dari Spreadsheet)
        const dataBerita = [
            {
                judul: "Bimtek Pendampingan Kurikulum SMK DIY Tahun 2026 Sukses Digelar",
                tanggal: "8 Mei 2026",
                gambar: "https://images.unsplash.com/photo-1577896851231-70ef18881754?w=600&auto=format&fit=crop&q=60",
                ringkasan: "Kegiatan Bimbingan Teknis (Bimtek) pendampingan implementasi kurikulum SMK telah dilaksanakan guna meningkatkan kualitas pembelajaran di DIY.",
                link: "#"
            },
            {
                judul: "Pengembangan Dashboard Sistem Informasi Data Kelulusan Tingkat SMK",
                tanggal: "4 Mei 2026",
                gambar: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=600&auto=format&fit=crop&q=60",
                ringkasan: "Optimalisasi dashboard pengelolaan data berbasis web terus dilakukan untuk memudahkan pelacakan status kelulusan siswa lintas kabupaten.",
                link: "#"
            },
            {
                judul: "Pembaruan Kelembagaan: Penyatuan SMK Kanisius 1 Pakem",
                tanggal: "24 April 2026",
                gambar: "https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=600&auto=format&fit=crop&q=60",
                ringkasan: "Proses administrasi dan perizinan terkait penyatuan institusi pendidikan SMK Kanisius 1 Pakem ke dalam SMK Sanjaya Pakem telah diterbitkan.",
                link: "#"
            },
            {
                judul: "Semarak Lomba Kompetensi Siswa (LKS) Jenjang Pendidikan Menengah 2026",
                tanggal: "7 April 2026",
                gambar: "https://images.unsplash.com/photo-1561489422-45de3d015e3e?w=600&auto=format&fit=crop&q=60",
                ringkasan: "Ajang LKS tingkat Daerah Istimewa Yogyakarta kembali menjadi panggung unjuk gigi keterampilan vokasi para siswa SMK dari berbagai kompetensi keahlian.",
                link: "#"
            },
            {
                judul: "Sosialisasi Program Momenku Siap Berkemas 2026",
                tanggal: "15 Maret 2026",
                gambar: "https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=600&auto=format&fit=crop&q=60",
                ringkasan: "Mendukung persiapan siswa SMK dalam menghadapi dunia kerja dan kemandirian melalui program inovatif unggulan dari Dinas Dikpora.",
                link: "#"
            }
        ];

        // Fungsi untuk merender berita secara otomatis ke dalam HTML
        function renderBerita() {
            const container = document.getElementById('news-container');
            let htmlContent = '';

            dataBerita.forEach(berita => {
                htmlContent += `
                    <div class="news-card">
                        <img src="${berita.gambar}" alt="Ilustrasi Berita" class="news-image">
                        <div class="news-content">
                            <div class="news-date"><i class="fa-regular fa-calendar"></i> ${berita.tanggal}</div>
                            <h4 class="news-title">${berita.judul}</h4>
                            <p class="news-excerpt">${berita.ringkasan}</p>
                            <a href="${berita.link}" class="read-more">Baca Selengkapnya &rarr;</a>
                        </div>
                    </div>
                `;
            });

            // Memasukkan hasil susunan ke dalam halaman
            container.innerHTML = htmlContent;
        }

        // Jalankan fungsi saat halaman selesai dimuat
        document.addEventListener('DOMContentLoaded', renderBerita);
    </script>
</body>
</html>
