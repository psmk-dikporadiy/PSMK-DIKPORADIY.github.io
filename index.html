<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Berita PSMK Dikpora DIY</title>
    
    <!-- Font Inter untuk Tampilan Modern -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
       @import url("https://fonts.googleapis.com/css2?family=Fjalla+One&display=swap");

@property --s {
	syntax: "<percentage>";
	inherits: false;
	initial-value: 0%;
}
@property --sm {
	syntax: "<percentage>";
	inherits: false;
	initial-value: 0%;
}
@property --x {
	syntax: "<percentage>";
	inherits: false;
	initial-value: -180%;
}
@property --x2 {
	syntax: "<percentage>";
	inherits: false;
	initial-value: 0%;
}
@property --sc {
	syntax: "<numbers>";
	inherits: false;
	initial-value: 1;
}
@property --ry {
	syntax: "<degrees>";
	inherits: false;
	initial-value: -33deg;
}
@property --ry2 {
	syntax: "<angle>";
	inherits: false;
	initial-value: 0deg;
}

* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: "Fjalla One", sans-serif;
}

html,
body {
	width: 100%;
	height: 100svh;
	background: #000;
	display: grid;
	place-items: center;
	overflow: hidden;
}

.scene,
.scene2 {
	position: relative;
	color: #fff;
	font-size: clamp(1.2rem, 4vw, 3rem); 
	transform-style: preserve-3d;
	perspective: 1000px;
}

.scene2 {
	position: absolute;
}

.scene {
	width: fit-content;
}

.scene span {
	display: block;
}

/* Mengubah durasi ke 10s dan menjadikannya infinite */
.move-number {
	position: absolute;
	right: 0;
	transform-style: preserve-3d;
	perspective: 1000px;
	transform: translateX(var(--x));
	animation: move 10s linear infinite; 
	will-change: transform;
}

.move-letter {
	position: absolute;
	left: var(--x2);
	right: 0;
	opacity: 0;
	transform: rotate(var(--ry2));
	animation: moveletter 10s ease-in-out infinite; /* Delay dihilangkan, diatur di keyframes */
	display: inline-block;
	width: fit-content;
}

.last-item {
	transform: scale(1, var(--sc)) rotateY(var(--ry)) translateZ(-3px);
	color: red;
	transition: transform 0.3s linear;
}

.number-container {
	mask: linear-gradient(
		to right,
		transparent 0%,
		black 0%,
		black var(--s),
		transparent var(--s)
	);
	transform: translateZ(2px);
	animation: move2 10s ease-in-out infinite; 
}

.msn-container {
	mask: linear-gradient(
		to right,
		transparent 0%,
		black 0%,
		black var(--sm),
		transparent var(--sm)
	);
	animation: msn-container 10s ease-in-out infinite; /* Delay dihilangkan, diatur di keyframes */
}

.mask-number {
	display: flex;
	white-space: pre; 
}

.mask-number span {
	color: red;
}

/* 
  KEYFRAMES TELAH DISINKRONKAN UNTUK LOOP 10 DETIK 
  0% - 40%   : Scene 1 Muncul dan Menghilang
  40% - 80%  : Scene 2 Muncul dan Menghilang
  80% - 100% : Jeda kosong sebelum ulang lagi
*/

@keyframes move {
	0% {
		--x: -180%;
		--sc: 1;
		--ry: -33deg;
		opacity: 0;
	}
	1% {
		--x: -180%;
		--sc: 1;
		--ry: -33deg;
		opacity: 1;
	}
	9% {
		--sc: 2;
		--x: 94%;
		--ry: -33deg;
	}
	20% {
		--sc: 1;
		--ry: 0deg;
		--x: 94%;
	}
	27% {
		--sc: 2;
		--ry: -33deg;
		--x: 94%;
	}
	36% {
		--x: -180%;
		--sc: 1;
		--ry: -33deg;
		opacity: 1;
	}
	38%, 100% {
		--x: -180%;
		--sc: 1;
		--ry: -33deg;
		opacity: 0;
	}
}

@keyframes move2 {
	0% { --s: 0%; }
	10%, 27% { --s: 100%; }
	36%, 100% { --s: 0%; }
}

@keyframes moveletter {
	0%, 39% {
		opacity: 0;
		--x2: 0%;
		--ry2: 0deg;
	}
	40% {
		opacity: 1;
		--x2: 0%;
		--ry2: 0deg;
	}
	49%, 70% {
		--x2: 93%;
		--ry2: 720deg;
		opacity: 1;
	}
	79% {
		--x2: 0%;
		--ry2: 0deg;
		opacity: 1;
	}
	80%, 100% {
		opacity: 0;
		--x2: 0%;
		--ry2: 0deg;
	}
}

@keyframes msn-container {
	0%, 40% {
		filter: blur(30px) contrast(10);
		--sm: 0%;
	}
	50%, 70% {
		filter: blur(0px) contrast(10);
		--sm: 100%;
	}
	80%, 100% {
		filter: blur(30px) contrast(10);
		--sm: 0%;
	}
}
    </style>
</head>
<body>

<div class="scene">
	<div class="move-number">
		<span class="last-item">K</span>
	</div>
	<div class="number-container">
		<span class="mask-number">Bidang Pembinaan SM</span>
	</div>
</div>
<div class="scene2">
	<div class="move-letter">
		<span class="last-item">Y</span>
	</div>
	<div class="msn-container">
		<span class="mask-number">Disdikpora DI <span>Y</span></span>
	</div>
</div>
</body>
</html>
