<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSMK-DIKPORA-DIY</title>

    <link rel="icon" href="https://baldikbantul.jogjaprov.go.id/wp-content/uploads/2024/01/Coat_of_arms_of_Yogyakarta.svg.png">

    <style>
        html, body{
            margin:0;
            height:100%;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, sans-serif;
            background:#f5f5f5;
        }

        .loading{
            text-align:center;
        }

        .spinner{
            width:50px;
            height:50px;
            border:5px solid #ddd;
            border-top:5px solid #0d6efd;
            border-radius:50%;
            animation:spin 1s linear infinite;
            margin:auto;
        }

        @keyframes spin{
            to{
                transform:rotate(360deg);
            }
        }

        p{
            margin-top:20px;
            color:#555;
        }
    </style>
</head>

<body>

<div class="loading">
    <div class="spinner"></div>
    <p>Mengalihkan ke aplikasi...</p>
</div>

<script>

    window.location.replace(url);
}, 800);
</script>

</body>
</html>
